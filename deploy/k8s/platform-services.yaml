            - name: OPENAI_COMPATIBLE_MODEL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: OPENAI_COMPATIBLE_MODEL
            - name: OPENAI_COMPATIBLE_CHAT_PATH
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: OPENAI_COMPATIBLE_CHAT_PATH
---
apiVersion: v1
