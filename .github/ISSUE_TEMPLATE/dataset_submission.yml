name: Dataset Submission
description: 新增数据集或数据集版本
title: "[Dataset] "
labels: ["dataset", "data-governance"]
body:
  - type: input
    id: dataset_name
    attributes:
      label: 数据集名称
      placeholder: patent-xxx-v1
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: license
    attributes:
      label: License
      placeholder: CC BY 4.0 / MIT / ...
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: 数据来源与处理说明
      placeholder: 来源、脱敏、清洗、切分策略
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: 下载地址
      placeholder: Hugging Face / OBS URL

