apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: patent-benchmark
data:
  COMMUNITY_SERVICE_URL: "http://community-service:8001"
  BENCHMARK_SERVICE_URL: "http://benchmark-service:8002"
  LLM_SERVICE_URL: "http://llm-service:8003"
  RESOURCE_SERVICE_URL: "http://resource-service:8004"
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: patent-benchmark
type: Opaque
stringData:
  GITHUB_OWNER: "your-org-or-username"
  GITHUB_REPO: "your-repository"
  GITHUB_TOKEN: ""
  OPENAI_COMPATIBLE_BASE_URL: ""
  OPENAI_COMPATIBLE_API_KEY: ""
  OPENAI_COMPATIBLE_MODEL: "gpt-4o-mini"
  OPENAI_COMPATIBLE_CHAT_PATH: "/v1/chat/completions"

