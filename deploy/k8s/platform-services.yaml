apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: patent-benchmark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: swr.cn-north-4.myhuaweicloud.com/your-org/api-gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: platform-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: patent-benchmark
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-service
  namespace: patent-benchmark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: community-service
  template:
    metadata:
      labels:
        app: community-service
    spec:
      containers:
        - name: community-service
          image: swr.cn-north-4.myhuaweicloud.com/your-org/community-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: GITHUB_OWNER
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: GITHUB_OWNER
            - name: GITHUB_REPO
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: GITHUB_REPO
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: GITHUB_TOKEN
---
apiVersion: v1
kind: Service
metadata:
  name: community-service
  namespace: patent-benchmark
spec:
  selector:
    app: community-service
  ports:
    - port: 8001
      targetPort: 8001
---
