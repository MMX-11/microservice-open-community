name: Bug Report
description: 报告平台 Bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      placeholder: 请描述遇到的问题与预期行为
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: 1. ... 2. ... 3. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 环境信息
      placeholder: 浏览器 / 系统 / 分支 / commit

