<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>社区活动 - 复刻 Events 风格</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/">社区活动</a>
        <nav class="main-nav">
          <a class="is-active" href="#">活动</a>
          <a href="#">论文</a>
          <a href="#">风云榜</a>
          <a href="#">专栏</a>
          <a href="#">知识树</a>
          <a href="#">项目</a>
          <a href="#">社交</a>
        </nav>
        <button class="login-btn" type="button">登录/注册</button>
      </div>
    </header>

    <section class="search-strip">
      <div class="search-inner">
        <input id="global-search-input" type="text" placeholder="搜索活动、标签、关键词" />
        <button id="global-search-btn" type="button">搜索</button>
      </div>
    </section>

    <main class="events-layout">
      <aside class="filters-panel">
        <div class="filter-card picked-card">
          <h3>已选（<span id="selected-count">0</span>）</h3>
          <button id="reset-filters-btn" type="button" class="ghost-btn">重选</button>
          <p id="selected-detail">当前未设置筛选条件</p>
        </div>

        <div class="filter-card">
          <h3>模块</h3>
          <div id="module-tabs" class="module-tabs">
            <button type="button" data-module="all" class="is-active">全部</button>
            <button type="button" data-module="文献任务榜">文献任务榜</button>
            <button type="button" data-module="AI前沿">AI前沿</button>
            <button type="button" data-module="开源分享">开源分享</button>
            <button type="button" data-module="主题论坛">主题论坛</button>
            <button type="button" data-module="团队模块">团队模块</button>
            <button type="button" data-module="博客">博客</button>
          </div>
        </div>

        <div class="filter-card">
          <h3>标签</h3>
          <div id="tag-filter-list" class="tag-filter-list"></div>
        </div>

        <div class="filter-card">
          <h3>社群</h3>
          <p>加入交流群，接收活动提醒与更新通知。</p>
          <button type="button" class="join-btn">加入</button>
        </div>
      </aside>

      <section class="events-panel">
        <div id="team-load-alert" class="team-load-alert" hidden></div>

        <div class="events-toolbar">
          <div class="toolbar-left">
            <h1>活动</h1>
            <p>听讲座，来社区。按模块与标签筛选你的关注内容。</p>
          </div>
          <div class="toolbar-right">
            <select id="status-select">
              <option value="all">全部状态</option>
              <option value="published">已发布</option>
              <option value="draft">草稿</option>
            </select>
            <select id="sort-select">
              <option value="updated_desc">综合排序</option>
              <option value="created_desc">最新发布</option>
              <option value="title_asc">标题 A-Z</option>
            </select>
          </div>
        </div>

        <div id="event-list" class="event-list"></div>

        <div class="events-pagination">
          <button id="page-prev-btn" type="button" class="ghost-btn">上一页</button>
          <span id="page-indicator">第 1 / 1 页</span>
          <button id="page-next-btn" type="button" class="ghost-btn">下一页</button>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <a href="#">社区指南</a>
      <span>电话：(010) 5095 5974</span>
      <span>邮箱：press@baai.ac.cn</span>
      <span>© 2026 社区平台</span>
      <a href="https://beian.miit.gov.cn" target="_blank" rel="noreferrer">京ICP备19012194号</a>
    </footer>

    <button id="assistant-fab" class="assistant-fab" type="button">
      <strong>Hi,社区课代表来啦</strong>
      <span>戳我聊聊～</span>
    </button>

    <section id="assistant-panel" class="assistant-panel" hidden>
      <header>
        <h2>社区维护智能体</h2>
        <button id="assistant-close-btn" type="button">关闭</button>
      </header>
      <label for="assistant-focus-input">维护目标</label>
      <textarea id="assistant-focus-input" rows="4" placeholder="例如：优先巡检团队模块和开源分享，输出本周维护待办。"></textarea>
      <div class="assistant-actions">
        <button id="run-maintenance-agent-btn" type="button">运行社区维护智能体</button>
        <button id="ask-llm-btn" type="button" class="ghost-btn">快速问答</button>
      </div>
      <pre id="llm-output">准备就绪，等待你的指令。</pre>
    </section>

    <script src="/static/app.js"></script>
  </body>
</html>
