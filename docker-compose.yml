services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8080:8000"
    environment:
      COMMUNITY_SERVICE_URL: "http://community-service:8001"
      BENCHMARK_SERVICE_URL: "http://benchmark-service:8002"
      LLM_SERVICE_URL: "http://llm-service:8003"
      RESOURCE_SERVICE_URL: "http://resource-service:8004"
      FRONTEND_DIR: "/app/frontend"
      ENABLE_API_DOCS: "${ENABLE_API_DOCS:-false}"
    depends_on:
      - community-service
      - benchmark-service
      - llm-service
      - resource-service
    volumes:
      - ./frontend:/app/frontend:ro

  community-service:
    build:
      context: .
      dockerfile: services/community-service/Dockerfile
    environment:
      GITHUB_ORG: "${GITHUB_ORG:-openKG-field}"
      GITHUB_OWNER: "${GITHUB_OWNER}"
      GITHUB_REPO: "${GITHUB_REPO}"
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
      HF_ORG: "${HF_ORG}"

  benchmark-service:
    build:
      context: .
      dockerfile: services/benchmark-service/Dockerfile
    volumes:
      - ./benchmarks:/app/benchmarks:ro
    environment:
      TASK_FILE: "/app/benchmarks/tasks.json"

  llm-service:
    build:
      context: .
      dockerfile: services/llm-service/Dockerfile
    environment:
      OPENAI_COMPATIBLE_BASE_URL: "${OPENAI_COMPATIBLE_BASE_URL}"
      OPENAI_COMPATIBLE_API_KEY: "${OPENAI_COMPATIBLE_API_KEY}"
      OPENAI_COMPATIBLE_MODEL: "${OPENAI_COMPATIBLE_MODEL}"
      OPENAI_COMPATIBLE_CHAT_PATH: "${OPENAI_COMPATIBLE_CHAT_PATH}"
      LLM_TIMEOUT_SECONDS: "${LLM_TIMEOUT_SECONDS:-60}"

  resource-service:
    build:
      context: .
      dockerfile: services/resource-service/Dockerfile
    volumes:
      - ./resources:/app/resources:ro
      - ./data:/app/data
    environment:
      RESOURCE_FILE: "/app/resources/catalog.json"
      RESOURCE_DB_FILE: "/app/data/community.db"

