apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: patent-benchmark-ingress
  namespace: patent-benchmark
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: patent-benchmark.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80

